{% extends 'base.html' %}
{% block title %}부품 등록 - KY 에너지관리{% endblock %}
{% block page_title %}부품 등록{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card-box">
      <div class="section-title">부품 정보 입력</div>
      <form method="post">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">부품명 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required placeholder="예: 흡입 필터 (50HP용)">
          </div>
          <div class="col-md-6">
            <label class="form-label">품번</label>
            <input type="text" name="part_no" class="form-control" placeholder="예: FL-50-001">
          </div>
          <div class="col-md-6">
            <label class="form-label">단위</label>
            <select name="unit" class="form-select">
              <option value="EA">EA (개)</option>
              <option value="CAN">CAN (캔)</option>
              <option value="SET">SET</option>
              <option value="BOX">BOX</option>
              <option value="L">L (리터)</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">현재 재고</label>
            <input type="number" name="stock_qty" class="form-control" value="0" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label">안전재고</label>
            <input type="number" name="safe_qty" class="form-control" value="2" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label">단가 (원)</label>
            <input type="number" name="unit_price" class="form-control" value="0" min="0">
          </div>
          <div class="col-12">
            <label class="form-label">보관위치</label>
            <input type="text" name="location" class="form-control" placeholder="예: 부품창고 A-1">
          </div>
          <div class="col-12">
            <label class="form-label">메모</label>
            <textarea name="memo" class="form-control" rows="2"></textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>등록</button>
          <a href="/inventory" class="btn btn-outline-secondary">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
