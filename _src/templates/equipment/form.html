{% extends 'base.html' %}
{% block title %}설비 {{ action }} - KY 에너지관리{% endblock %}
{% block page_title %}설비 {{ action }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card-box">
      <div class="section-title">설비 기본 정보</div>
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">설비명 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ eq.name if eq else '' }}" required placeholder="예: 50HP 스크류 콤프레샤 #1">
          </div>
          <div class="col-md-6">
            <label class="form-label">모델명</label>
            <input type="text" name="model" class="form-control" value="{{ eq.model if eq else '' }}" placeholder="예: KOBELCO SG-50A">
          </div>
          <div class="col-md-3">
            <label class="form-label">마력 (HP)</label>
            <input type="number" name="horsepower" class="form-control" step="0.1" value="{{ eq.horsepower if eq else '' }}" placeholder="50">
          </div>
          <div class="col-md-3">
            <label class="form-label">정격전력 (kW)</label>
            <input type="number" name="rated_power" class="form-control" step="0.1" value="{{ eq.rated_power if eq else '' }}" placeholder="37.3">
          </div>
          <div class="col-md-3">
            <label class="form-label">상태</label>
            <select name="status" class="form-select">
              <option value="가동중" {% if eq and eq.status=='가동중' %}selected{% endif %}>가동중</option>
              <option value="정지"   {% if eq and eq.status=='정지'   %}selected{% endif %}>정지</option>
              <option value="점검중" {% if eq and eq.status=='점검중' %}selected{% endif %}>점검중</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">설치일</label>
            <input type="date" name="install_date" class="form-control"
                   value="{{ eq.install_date.isoformat() if eq and eq.install_date else '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">설치장소</label>
            <input type="text" name="install_loc" class="form-control" value="{{ eq.install_loc if eq else '' }}" placeholder="예: 압축기실 A">
          </div>
          <div class="col-12">
            <label class="form-label">메모</label>
            <textarea name="memo" class="form-control" rows="3">{{ eq.memo if eq else '' }}</textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ action }}</button>
          <a href="/equipment" class="btn btn-outline-secondary">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
