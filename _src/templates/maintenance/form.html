{% extends 'base.html' %}
{% block title %}정비 이력 등록 - KY 에너지관리{% endblock %}
{% block page_title %}정비 이력 등록{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card-box">
      <div class="section-title">정비 이력 입력</div>
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">설비 선택 <span class="text-danger">*</span></label>
            <select name="equipment_id" class="form-select" required>
              <option value="">-- 선택 --</option>
              {% for e in equipments %}
              <option value="{{ e.id }}">{{ e.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">정비일 <span class="text-danger">*</span></label>
            <input type="date" name="maint_date" class="form-control" value="{{ today }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">정비 유형</label>
            <select name="maint_type" class="form-select">
              <option value="필터 교체">필터 교체</option>
              <option value="오일 교체">오일 교체</option>
              <option value="점검">점검</option>
              <option value="수리">수리</option>
              <option value="벨트 교체">벨트 교체</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">비용 (원)</label>
            <input type="number" name="cost" class="form-control" value="0" min="0">
          </div>
          <div class="col-md-6">
            <label class="form-label">담당자</label>
            <input type="text" name="worker" class="form-control" placeholder="예: 홍길동">
          </div>
          <div class="col-md-6">
            <label class="form-label">다음 점검 예정일</label>
            <input type="date" name="next_date" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">정비 내용</label>
            <textarea name="description" class="form-control" rows="3" placeholder="정비 내용을 상세히 기록하세요."></textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>저장</button>
          <a href="/maintenance" class="btn btn-outline-secondary">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
